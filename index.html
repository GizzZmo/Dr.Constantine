    <script>
        const appData = {
            chapters: [
                { id: 'intro', title: '00. Forside & Forord', type: 'text' },
                { id: 'ch1', title: '01. Innledning', type: 'text' },

                { id: 'glossary', title: '>> Ordliste (Datakjerne)', type: 'interactive' },
                { id: 'ai-lab', title: '>> AI Komposisjons-lab', type: 'interactive' },
                { id: 'ai-lyrics', title: '>> Lyrisk Ledemotiv', type: 'interactive' },

                { id: 'ai-daw-mixer', title: '>> DAW Mikse-assistent', type: 'interactive' },

                { id: 'ai-chat', title: '>> Spør Forfatteren', type: 'interactive' },
                { id: 'outro', title: 'EOF. Siste ord', type: 'text' }
            ],
            glossaryTerms: [
                { term: "DAW (Digital Audio Workstation)", definition: "Programvare (f.eks. Logic, Cubase, Ableton) brukt til å skulpturere og sekvensere lyd matematisk og visuelt." },
                { term: "Expectancy Theory", definition: "Huron's teori som kartlegger hvordan hjernens dopamin-nettverk belønner lytteren når spesifikke musikalske forventninger innfris eller brytes på en trygg måte." },
                { term: "Modal Mixture", definition: "En teknikk hvor man midlertidig 'låner' akkorder fra en parallell toneart (f.eks. Eb dur i en C dur-progresjon) for å fremtvinge en kognitiv re-orientering." },
                { term: "Neo-Riemannsk Teori", definition: "Et geometrisk rammeverk som forklarer akkordprogresjoner gjennom minimal bevegelse i enkeltstemmer (PLR-operasjoner) heller enn deres funksjon i en tradisjonell skala." },
                { term: "Parsimonious Voice Leading", definition: "Å bytte harmonisk tilstand med absolutt minimal friksjon, typisk ved å bare flytte én eller to toner et halvt trinn." },
                { term: "Pitch-Class Set Theory", definition: "Kategorisering av akkorder som matematiske mengder (f.eks. [0,3,7]), som fjerner illusjonen om dur/moll-hierarkier og avdekker rå intervall-spenning." },
                { term: "Prosodi", definition: "Den intrikate synkroniseringen mellom språkets iboende fonetiske rytme og musikkens underliggende mikrotiming." },
                { term: "Spektromorfologi", definition: "Studien av hvordan en lyds klangfarge og spektrale masse (f.eks. vreng/distortion) utvikler seg som en fysisk form over tid." },
                { term: "Subtraktiv dynamikk", definition: "Den kalkulerte fjerningen av frekvens-energi (ofte i bassområdet) for å skape et psykoakustisk vakuum før 'The Drop'." },
                { term: "Timbral Modulasjon", definition: "Når overgangen mellom seksjoner primært drives av endringer i tekstur, rom og klang, mens akkorder og tempo forblir låst." }
            ],
            content: {
                'intro': `
                    <div class="text-center mb-16 mt-8">
                        <p class="text-sm tracking-widest text-[#00F0FF] mb-4 cyber-font">SYS.DOKTORAVHANDLING // EMPIRISK_STUDIE_V3</p>
                        <h1 class="text-4xl md:text-6xl cyber-font text-[#00FF41] mb-6 leading-tight drop-shadow-[0_0_8px_rgba(0,255,65,0.6)]">LOOPENS TYRANNI <br><span class="text-[#FF003C]">&</span> FRIHET</h1>
                        <p class="text-lg text-gray-300 font-light max-w-2xl mx-auto border-l-2 border-[#00FF41] pl-4 text-left">En dybdeanalyse av harmonisk statikk, perseptuell manipulasjon og narrativ progresjon i moderne, grid-låst populærmusikk.</p>
                    </div>
                    <div class="cyber-panel p-8 md:p-12 mt-12">
                        <h2 class="text-3xl cyber-font mb-4 text-[#00F0FF]">&gt; FORORD.exe</h2>
                        <p class="text-gray-500 cyber-font mb-8 pb-4 border-b border-[#333]">Opphav: Dr. Jon-Arve Constantine // Produsent & Musikkviter</p>
                        <div class="space-y-6 text-gray-300 leading-relaxed text-lg font-light">
                            <p>Musikken har alltid vært en refleksjon av teknologien som fanger den. Da vi gikk fra papirnoter til magnetbånd, endret vi form. Da vi gikk fra bånd til det digitale rutenettet (The Grid), endret vi DNA-et til selve komposisjonen. Dette har ført oss til vår tids største musikalske paradoks: Hvordan kan musikk som er strippet ned til fire repeterende akkorder i et urokkelig, matematisk låst tempo, makte å formidle de dypeste menneskelige tragedier og euforiske triumfer?</p>
                            <p>I tiår har den akademiske eliten, preget av en utdatert beundring for lineær klassisk musikk, avfeid moderne sjangre som nu-metal, trap og kommersiell pop som harmonisk fattige. De har lyttet på feil akse. Denne avhandlingen, støttet av et massivt arkiv på over 1100 egenproduserte spor, krever at vi kalibrerer våre auditive sensorer på nytt.</p>
                            <p>Vi skal dekonstruere "loopen". Vi skal bevise at når den horisontale utviklingen strupes, eksploderer kompleksiteten på den vertikale aksen. Gjennom Allen Fortes sett-teori, spektral maskering og prosodisk mikrotiming skal vi se den rå koden bak magien.</p>
                            <p>Dette er ikke bare et teoretisk rammeverk; det er en teknisk manual for fremtidens lydarkitekter. Velkommen til maskinen.</p>
                        </div>
                    </div>
                `,
                'ch1': `
                    <p class="mb-8 text-gray-400 bg-[#0A0A0C] border border-[#333] p-5 border-l-4 border-l-[#FF003C] text-md font-light">[INFO_LOG]: Etablering av hovedkonflikt. Den lineære reisens død, og loopens fødsel som et nytt emosjonelt fundament.</p>
                    <h2 class="text-4xl cyber-font text-[#00FF41] mb-8 border-b-2 border-[#00FF41]/30 pb-4">01. INNLEDNING</h2>
                    <h3 class="text-2xl cyber-font mt-10 mb-4 text-[#00F0FF]">&gt; 1.1 REPETISJONENS_PARADOKS</h3>
                    <p class="mb-5 text-gray-300 leading-relaxed text-lg font-light">I det 21. århundrets musikalske økosystem har den tradisjonelle harmoniske reisen – med sine komplekse modulasjoner og sonate-strukturer – kapitulert for den sirkulære logikken: <strong class="text-[#00FF41] font-normal">loopen</strong>. Teknologiske og kommersielle krefter har presset frem formater som krever umiddelbar gjenkjennelse. Adorno (1941) advarte mot standardisering, og mente repetisjon ville passivisere lytteren. Adorno tok feil. Han forsto ikke at restriksjon avler innovasjon.</p>
                    
                    <div class="cyber-panel p-6 my-8 border-l-4 border-l-[#00F0FF]">
                        <p class="text-lg cyber-font text-[#00F0FF] italic text-center">"Når de harmoniske variablene minimeres til en statisk loop, hvilke andre algoritmer i lydbildet overtar ansvaret for strukturell og emosjonell kontrast?"</p>
                    </div>
                    
                    <p class="mb-5 text-gray-300 leading-relaxed text-lg font-light">Middleton (1990) observerte at loopens sanne funksjon ikke er å stagnere, men å indusere en tilstand av "groove". Dette groove-et fungerer som en transe, et fundamentalt nullpunkt. Det er nettopp <em>fordi</em> loopen er forutsigbar, at produsenten kan manipulere de subtile makro-parametrene for å ryste lytteren til beinet når droppet omsider treffer.</p>
                    
                    <h3 class="text-2xl cyber-font mt-10 mb-4 text-[#00F0FF]">&gt; 1.2 HARMONISK_SEMENTERING_OG_DET_VERTIKALE_SKIFTET</h3>
                    <p class="mb-5 text-gray-300 leading-relaxed text-lg font-light">Klassisk funksjonsharmoni analyserer spenning som et forhold mellom dominant og tonika. I sjangre som drue-tung R&B eller aggressiv metal, slutter akkordene å fungere som retningspiler. De blir i stedet <strong class="text-[#00FF41] font-normal">vektløse teksturflater</strong>. Når fire akkorder repeteres i 180 sekunder, slutter hjernen å lytte etter akkordskifter. Oppmerksomheten flyttes 90 grader: fra den horisontale tidsaksen (når kommer neste akkord?) til den vertikale spektralaksen (hvor tykk, bred og vrengt er denne akkorden akkurat nå?).</p>
                    
                    <h3 class="text-2xl cyber-font mt-10 mb-4 text-[#00F0FF]">&gt; 1.3 METODISK_KRYSSPPUNKT_FOR_SYSTEMANALYSE</h3>
                    <p class="mb-5 text-gray-300 leading-relaxed text-lg font-light">For å reverse-engineere denne prosessen, kreves et tverrfaglig analyseverktøy som kombinerer maskinell logikk med nevrovitenskap:</p>
                    <ul class="list-none space-y-4 mb-8 cyber-panel p-8">
                        <li class="flex items-start"><span class="mr-4 text-[#FF003C] text-2xl leading-none">&raquo;</span> <div class="text-lg font-light text-gray-300"><strong class="text-white cyber-font">Kognitiv Psykoakustikk:</strong> Måling av hvordan hjernen kvantifiserer spenning basert på frekvensbortfall og auditiv maskering før et dropp.</div></li>
                        <li class="flex items-start"><span class="mr-4 text-[#FF003C] text-2xl leading-none">&raquo;</span> <div class="text-lg font-light text-gray-300"><strong class="text-white cyber-font">Neo-Riemannsk Kartlegging:</strong> Geometrisk analyse av hvordan stemmeføring i loopen skaper sømløs rullering uten å fremprovosere tretthet.</div></li>
                        <li class="flex items-start"><span class="mr-4 text-[#FF003C] text-2xl leading-none">&raquo;</span> <div class="text-lg font-light text-gray-300"><strong class="text-white cyber-font">Prosodisk Narratologi:</strong> Dekoding av vokalens mikrotiming og lyriske ledemotiver som binder et konseptalbum sammen over vidt forskjellige sjangre.</div></li>
                    </ul>
                `,
                'ch2': `
                    <p class="mb-8 text-gray-400 bg-[#0A0A0C] border border-[#333] p-5 border-l-4 border-l-[#FF003C] text-md font-light">[INFO_LOG]: Det abstrakte fundamentet. Akkorder betraktes ikke lenger som funksjoner i en skala, men som numeriske koordinater i et geometrisk rom.</p>
                    <h2 class="text-4xl cyber-font text-[#00FF41] mb-8 border-b-2 border-[#00FF41]/30 pb-4">02. MATEMATIKKEN BAK LOOPEN</h2>
                    
                    <h3 class="text-2xl cyber-font mt-10 mb-4 text-[#00F0FF]">&gt; 2.1 PITCH-CLASS_SET_THEORY</h3>
                    <p class="mb-5 text-gray-300 leading-relaxed text-lg font-light">Når vi forlater den tradisjonelle C-dur skalaens trygghet, må vi bruke Allen Fortes (1973) <em>Pitch-Class Set Theory</em>. Her strippes musikken for bias; en tone er kun et tall fra 0 til 11. En moll-treklang og en dur-treklang deler det samme numeriske potensialet, representert ved Prime Form <span class="text-[#00FF41] font-mono">[0, 3, 7]</span>.</p>
                    <p class="mb-5 text-gray-300 leading-relaxed text-lg font-light">I moderne metal eller mørk elektronika fjerner produsenter ofte tersen for å skape emosjonell ambivalens. Vi står igjen med dyaden <span class="text-[#FF003C] font-mono">[0, 7]</span>. Grunnen til at en loop bestående av power chords (vi - IV - I - V) ikke kollapser, er at mangelen på definert ters tillater vokalen å påtvinge akkordene skiftende modalitet i sanntid. Loopen blir et speil for topplinjens matematiske intensjoner.</p>
                    
                    <div class="bg-[#050505] border border-[#00FF41]/30 text-white p-6 my-8 flex flex-col md:flex-row items-center justify-center md:space-x-12 space-y-6 md:space-y-0 font-mono shadow-[0_0_15px_rgba(0,255,65,0.1)]">
                         <div class="text-center w-full md:w-auto">
                             <div class="text-xs text-[#00F0FF] mb-2 uppercase tracking-widest border-b border-[#333] pb-2">Kompleks Akkord</div>
                             <div class="text-3xl text-gray-300 mt-2">[0, 4, 7, 10, 14]</div>
                         </div>
                         <div class="text-4xl text-[#FF003C] hidden md:block">&rarr;</div>
                         <div class="text-4xl text-[#FF003C] md:hidden">&darr;</div>
                         <div class="text-center w-full md:w-auto">
                             <div class="text-xs text-[#00F0FF] mb-2 uppercase tracking-widest border-b border-[#333] pb-2">Reduktiv Loop (Dyade)</div>
                             <div class="text-3xl text-[#00FF41] drop-shadow-[0_0_5px_#00FF41] mt-2">[0, 7]</div>
                         </div>
                    </div>
                    
                    <h3 class="text-2xl cyber-font mt-10 mb-4 text-[#00F0FF]">&gt; 2.2 TONNETZ_OG_PLR-OPERASJONER</h3>
                    <p class="mb-5 text-gray-300 leading-relaxed text-lg font-light">Hvordan kan fire akkorder spinne uendelig uten å trette ut hjernen? David Lewins (1987) <em>Neo-Riemannske transformasjonsteori</em> gir svaret via geometrisk stemmeføring i et "Tonnetz". Vi ser ikke på akkordens rot-sprang, men på <em>parsimonious voice leading</em> – den minimale fysiske avstanden enkeltstemmene må flytte seg.</p>
                    <ul class="list-none space-y-2 mb-6 text-gray-300 font-light border-l-2 border-[#333] pl-4">
                        <li><strong class="text-[#00F0FF] cyber-font">P (Parallel):</strong> C dur &harr; C moll. Kun tersen flyttes et halvt trinn.</li>
                        <li><strong class="text-[#00F0FF] cyber-font">L (Leittonwechsel):</strong> C dur &harr; E moll. Grunntonen faller et halvt trinn.</li>
                        <li><strong class="text-[#00F0FF] cyber-font">R (Relative):</strong> C dur &harr; A moll. Kvinten stiger et helt trinn.</li>
                    </ul>
                    <p class="mb-5 text-gray-300 leading-relaxed text-lg font-light">En standard loop som C - G - Am - F er i realiteten en serie med hyper-effektive bevegelser i Tonnetz-geometrien. Lytterens hjerne spores til å følge de statiske "lim-tonene" (common tones) som holdes over fra en akkord til den neste. Det er denne usynlige, matematiske tråden som skaper illusjonen av evig fremdrift, og som gjør at tempoet kan låses i et fast grid uten å føles statisk.</p>
                `,
                'ch3': `
                    <p class="mb-8 text-gray-400 bg-[#0A0A0C] border border-[#333] p-5 border-l-4 border-l-[#FF003C] text-md font-light">[INFO_LOG]: Manipulasjon av nevro-kjemiske systemer. Hvordan fravær av frekvenser bygger spenning, og hvordan støy genererer dopamin.</p>
                    <h2 class="text-4xl cyber-font text-[#00FF41] mb-8 border-b-2 border-[#00FF41]/30 pb-4">03. PERSEPTUELL DYNAMIKK</h2>
                    
                    <h3 class="text-2xl cyber-font mt-10 mb-4 text-[#00F0FF]">&gt; 3.1 EXPECTANCY_THEORY_I_DET_LÅSTE_GRIDET</h3>
                    <p class="mb-5 text-gray-300 leading-relaxed text-lg font-light">David Huron (2006) demonstrerte at den menneskelige hjerne kontinuerlig genererer underbevisste prediksjoner om auditiv input. Dopamin – belønningshormonet – utløses primært i øyeblikket en forventning bekreftes på en tilfredsstillende måte, eller brytes på en ufarlig, overraskende måte. I klassisk musikk skjedde dette via overraskende akkordskifter (Deceptive Cadence). Men når loopen er statisk, <em>vet</em> hjernen nøyaktig hvilken akkord som kommer om 4 slag. Forventningsbruddet må derfor rutes via en annen protokoll: <strong class="text-white">Timbral Modulasjon</strong>.</p>

                'outro': `
                    <div class="text-center mt-12 mb-8">

                        <p>Å dissekere musikk ned til dens matematiske og akustiske atomer kan for den uinnvidde fremstå som et kynisk forsøk på å fjerne sjel og magi. For meg har prosessen tvert imot forstørret mirakelet. Når man forstår fysikken bak en tåre, gjør det ikke tåren mindre ekte.</p>
                        <p>Et arkiv på over 1100 spor er ikke bare samlinger av MP3-filer; det utgjør tusenvis av nattetimer i maskinens laboratorium. En nådeløs jakt etter den perfekte overgangen, det knusende droppet, og den sanne emosjonelle friheten innenfor den strengeste av rammer.</p>
                        <p>Når vi endelig innser at en repetitiv loop ikke er et hjul som spinner fast i gjørma, men et massivt dreiehjul for en pottemaker – der selve lyden kontinuerlig formes, skulptureres og vris på den vertikale z-aksen – da åpner det seg et uendelig kreativt rom.</p>

                    </div>
                `
            }
        };

        let currentChart = null;
        let aiSettings = { provider: 'gemini', apiKey: '' };

        function loadSettings() {
            try {
                const saved = localStorage.getItem('aiSettings');
                if (saved) aiSettings = JSON.parse(saved);
            } catch(e) { console.error('Kunne ikke laste AI-innstillinger:', e); }
            document.getElementById('aiProviderSelect').value = aiSettings.provider;
            document.getElementById('aiApiKeyInput').value = aiSettings.apiKey;
        }

        function saveSettings() {
            aiSettings.provider = document.getElementById('aiProviderSelect').value;
            aiSettings.apiKey = document.getElementById('aiApiKeyInput').value.trim();
            const msg = document.getElementById('settingsSavedMsg');
            try {
                localStorage.setItem('aiSettings', JSON.stringify(aiSettings));
                msg.textContent = '// KONFIG_LAGRET';
                msg.classList.remove('hidden', 'text-[#FF003C]');
                msg.classList.add('text-[#00FF41]');
            } catch(e) {
                console.error('Kunne ikke lagre AI-innstillinger:', e);
                msg.textContent = '// LAGRING_FEILET';
                msg.classList.remove('hidden', 'text-[#00FF41]');
                msg.classList.add('text-[#FF003C]');
            }
            setTimeout(() => msg.classList.add('hidden'), 2000);
        }

        function initApp() {
            renderSidebar();
            loadSettings();
            navigateTo('intro');
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            });
            document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
        }

        function renderSidebar() {
            const navContainer = document.getElementById('navContainer');
            appData.chapters.forEach(chap => {
                const link = document.createElement('a');
                link.href = "#" + chap.id;
                link.className = 'nav-link block px-4 py-3 text-sm rounded cursor-pointer cyber-font tracking-wide';
                link.textContent = chap.title;
                link.dataset.id = chap.id;
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    navigateTo(chap.id);
                    if (window.innerWidth < 768) {
                        document.getElementById('sidebar').classList.add('-translate-x-full');
                    }
                });
                navContainer.appendChild(link);
            });
        }

        function navigateTo(chapterId) {
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('active');
                if (el.dataset.id === chapterId) el.classList.add('active');
            });

            const contentArea = document.getElementById('contentArea');
            contentArea.classList.remove('content-fade-in');
            void contentArea.offsetWidth; 
            contentArea.innerHTML = appData.content[chapterId];
            contentArea.classList.add('content-fade-in');
            document.getElementById('mainScrollArea').scrollTo(0, 0);

            const chapterData = appData.chapters.find(c => c.id === chapterId);
            
            if (chapterData.type === 'chart') {
                renderChart(chapterData.chartId);
            } else if (chapterData.id === 'glossary') {
                renderGlossary();
            } else if (chapterData.id === 'ai-lab') {
                document.getElementById('aiGenerateBtn').addEventListener('click', handleAIGeneration);
            } else if (chapterData.id === 'ai-lyrics') {
                document.getElementById('aiLyricsBtn').addEventListener('click', handleAILyrics);
            } else if (chapterData.id === 'ai-lyric-analyzer') {
                document.getElementById('aiLyricAnalyzerBtn').addEventListener('click', handleAILyricAnalyzer);
            } else if (chapterData.id === 'ai-daw-mixer') {
                document.getElementById('aiDawMixerBtn').addEventListener('click', handleAIDawMixer);

        function renderGlossary() {
            const listContainer = document.getElementById('glossaryList');
            const searchInput = document.getElementById('glossarySearch');
            const displayTerms = (terms) => {
                listContainer.innerHTML = '';
                if(terms.length === 0) { listContainer.innerHTML = '<p class="text-gray-500 cyber-font p-4">/NO_MATCH_FOUND</p>'; return; }
                terms.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'cyber-panel p-5 transition hover:border-[#00FF41] hover:shadow-[0_0_10px_rgba(0,255,65,0.2)]';
                    div.innerHTML = "<h4 class='text-[#00FF41] text-xl cyber-font mb-2'>" + item.term + "</h4><p class='text-gray-300 font-light leading-relaxed'>" + item.definition + "</p>";
                    listContainer.appendChild(div);
                });
            };
            displayTerms(appData.glossaryTerms);
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = appData.glossaryTerms.filter(item => item.term.toLowerCase().includes(query) || item.definition.toLowerCase().includes(query));
                displayTerms(filtered);
            });
        }

        // Generic API Caller with Backoff — supports Gemini, OpenAI, and Anthropic
        async function callAI(systemPrompt, userPrompt, resultDiv, loadingIndicator, button) {
            const { provider, apiKey } = aiSettings;
            if (!apiKey) {
                resultDiv.innerHTML = '<span class="text-[#FF003C] font-bold">ERROR_NO_API_KEY:</span> Ingen API-nøkkel er konfigurert. Legg inn nøkkel i AI_KONFIG-panelet i venstre meny.';
                resultDiv.classList.remove('hidden');
                return;
            }

            button.disabled = true;
            loadingIndicator.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            let url, headers, payload;

            if (provider === 'openai') {
                url = 'https://api.openai.com/v1/chat/completions';
                headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey };
                payload = { model: 'gpt-4o', messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }], temperature: 0.7 };
            } else if (provider === 'anthropic') {
                url = 'https://api.anthropic.com/v1/messages';
                headers = { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' };
                payload = { model: 'claude-opus-4-5', max_tokens: 2048, system: systemPrompt, messages: [{ role: 'user', content: userPrompt }] };
            } else {
                url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=' + apiKey;
                headers = { 'Content-Type': 'application/json' };
                payload = { contents: [{ parts: [{ text: userPrompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { temperature: 0.7 } };
            }

            try {
                let retries = 0;
                let delay = 1000;
                let responseData = null;

                while (retries < 5) {
                    try {
                        const response = await fetch(url, { method: 'POST', headers, body: JSON.stringify(payload) });
                        if (!response.ok) throw new Error("HTTP " + response.status);
                        responseData = await response.json();
                        break;
                    } catch (error) {
                        retries++;
                        if (retries >= 5) throw error;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    }
                }

                let text;
                if (provider === 'openai') {
                    text = responseData.choices?.[0]?.message?.content;
                } else if (provider === 'anthropic') {
                    text = responseData.content?.[0]?.text;
                } else {
                    text = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
                }

                if (text) {
                    const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>');
                    resultDiv.innerHTML = formattedText;
                    resultDiv.classList.remove('hidden');
                } else {
                    throw new Error("Mottok ingen tekst fra API-et.");
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = '<span class="text-[#FF003C] font-bold">ERROR_CONNECTION_FAILED:</span> AI-kjernen er for øyeblikket offline. Sjekk API-nøkkel og prøv igjen.';
                resultDiv.classList.remove('hidden');
            } finally {
                button.disabled = false;
                loadingIndicator.classList.add('hidden');
            }
        }
